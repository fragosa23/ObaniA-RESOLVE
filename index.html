<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR PRO - V25.0</title>
    <style>
        :root { --bg: #030303; --accent: #00ff88; --card: #0d1117; --text: #ffffff; --nav-bg: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .banner { width: 100%; height: 120px; position: relative; overflow: hidden; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .banner-txt { position: absolute; bottom: 10px; left: 15px; color: var(--accent); font-weight: 900; font-size: 11px; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; font-weight: bold; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .page-section { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        .card { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid #222; padding: 15px; }
        .btn-run { background: var(--accent); color: #000; padding: 10px; border-radius: 6px; border: none; font-weight: 900; width: 100%; margin-bottom: 20px; }
        .key-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="banner">
    <video autoplay muted loop playsinline><source src="gemini_generated_video_134FB941.mp4" type="video/mp4"></video>
    <div class="banner-txt">Eng. LMM: Radar Operacional</div>
</div>

<div id="section-news" class="page-section active">
    <button class="btn-run" onclick="startRadar()">EXECUTAR RADAR (RUN)</button>
    <div id="feed"></div>
</div>

<div id="section-trends" class="page-section"><div id="trends-list"></div></div>

<div id="section-archive" class="page-section"><div id="archive-list"></div></div>

<div id="section-video" class="page-section"><div id="video-list"></div></div>

<div id="section-settings" class="page-section">
    <h3 style="color:var(--accent); font-size:12px;">CHAVE DE SEGURANÇA (API KEY)</h3>
    <p style="font-size:11px; color:#888;">Esta chave fica guardada apenas no teu iPhone e nunca será vista pelo GitHub.</p>
    <input type="password" id="api-key-input" class="key-input" placeholder="Cola aqui a tua chave AIzaSy...">
    <button class="btn-run" onclick="saveKey()">GUARDAR NO TELEMÓVEL</button>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('news', this)">📰<br>NOTÍCIAS</div>
    <div class="nav-item" onclick="switchPage('trends', this)">📈<br>TRENDS</div>
    <div class="nav-item" onclick="switchPage('archive', this)">📁<br>ARQUIVO</div>
    <div class="nav-item" onclick="switchPage('video', this)">🎬<br>VÍDEO</div>
    <div class="nav-item" onclick="switchPage('settings', this)">⚙️<br>SETUP</div>
</div>

<script>
    // Função para guardar a chave no iPhone
    function saveKey() {
        const key = document.getElementById('api-key-input').value;
        if(key.startsWith('AIza')) {
            localStorage.setItem('lmm_key', key);
            alert("✅ Chave guardada com sucesso no teu iPhone!");
            switchPage('news', document.querySelector('.nav-item'));
        } else {
            alert("❌ Chave inválida. Deve começar por 'AIza'.");
        }
    }

    function switchPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('section-' + pageId).classList.add('active');
        el.classList.add('active');
    }

    async function startRadar() {
        const key = localStorage.getItem('lmm_key');
        if(!key) {
            alert("⚠️ Engenheiro, vai primeiro ao ícone SETUP (⚙️) e cola a tua chave!");
            return;
        }
        
        document.getElementById('feed').innerHTML = '<p style="text-align:center; color:var(--accent);">_A INTERCEPTAR SINAIS...</p>';
        
        try {
            const prompt = "Dá-me 6 notícias: 3 🌐 Mundiais de IA e 3 🇵🇹 de Portugal (Tecnologia/Economia). Formato: ICON | TAG | FONTE | TITULO | RESUMO_3_LINHAS. No fim, SOCIAL: Tag1:90, Tag2:70...";
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            // Lógica de renderização simplificada para teste
            document.getElementById('feed').innerHTML = '<p style="text-align:center;">Radar pronto! Sistema a processar dados...</p>';
            console.log(data);
        } catch (e) {
            alert("❌ Erro de ligação. Verifica a tua chave no SETUP.");
        }
    }
</script>
</body>
</html>
