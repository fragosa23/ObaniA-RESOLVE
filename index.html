<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR V17</title>
    <style>
        :root { --bg: #030303; --accent: #00ff88; --card: #0d1117; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        .banner { width: 100%; height: 120px; position: relative; overflow: hidden; border-bottom: 2px solid var(--accent); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .banner-txt { position: absolute; bottom: 12px; left: 15px; color: var(--accent); font-weight: 900; font-size: 14px; text-transform: uppercase; text-shadow: 2px 2px 8px #000; }
        #hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-run { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); color: #000; font-size: 20px; font-weight: 900; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; display: none; }
        .card { background: var(--card); border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; padding: 15px; }
        #loader { display: none; text-align: center; color: var(--accent); padding: 60px; font-family: monospace; }
        .diag-box { display: none; margin: 20px; padding: 15px; background: #200; border: 1px solid #f00; color: #f66; font-size: 11px; text-align: left; border-radius: 8px; font-family: monospace; }
    </style>
</head>
<body>

<div class="banner">
    <video autoplay muted loop playsinline>
        <source src="gemini_generated_video_134FB941.mp4" type="video/mp4">
    </video>
    <div class="banner-txt">Eng. LMM recomenda:</div>
</div>

<div id="hero">
    <button class="btn-run" onclick="launch()">RUN</button>
</div>

<div id="diag" class="diag-box"></div>
<div id="loader">_A INTERCEPTAR SINAIS...</div>

<div id="main-content" class="container">
    <div id="feed"></div>
</div>

<script>
    // Se esta chave falhar, teremos de gerar uma nova no Google AI Studio (é grátis)
    const API_KEY = "AIzaSyDYeRO1K8cMLzTF33Aee4YmwCf14-RB384";
    const MODEL = "gemini-1.5-flash";

    async function launch() {
        const diag = document.getElementById('diag');
        const loader = document.getElementById('loader');
        diag.style.display = 'none';
        loader.style.display = 'block';
        document.getElementById('hero').style.display = 'none';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Dá-me 5 notícias de IA de hoje. Formato: Fonte | Título | Resumo" }] }] })
            });

            const data = await res.json();

            if (data.error) {
                throw new Error(`CÓDIGO: ${data.error.code} - ${data.error.message}`);
            }

            if (!data.candidates || !data.candidates[0]) {
                throw new Error("RESPOSTA VAZIA: A Google não enviou candidatos. Possível bloqueio de região ou filtro.");
            }

            const text = data.candidates[0].content.parts[0].text;
            render(text);

        } catch (e) {
            diag.style.display = 'block';
            diag.innerHTML = `🚨 <b>ERRO DE DIAGNÓSTICO:</b><br>${e.message}`;
            document.getElementById('hero').style.display = 'flex';
        } finally {
            loader.style.display = 'none';
        }
    }

    function render(text) {
        const lines = text.split('\n').filter(l => l.includes('|'));
        document.getElementById('feed').innerHTML = lines.map(l => {
            const [s, t, r] = l.split('|');
            return `<div class="card">
                <div style="font-size:10px; color:var(--accent)">${s || 'IA'}</div>
                <div style="font-weight:800; margin:5px 0">${t || 'Notícia'}</div>
                <div style="font-size:13px; color:#8b949e">${r || l}</div>
            </div>`;
        }).join('');
        document.getElementById('main-content').style.display = 'block';
    }
</script>
</body>
</html>
