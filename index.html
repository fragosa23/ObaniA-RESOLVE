<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMM AI RADAR PRO</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030303; --card: #0d1117; --accent: #00ff88;
            --blue: #00d2ff; --purple: #bc13fe; --text: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }

        /* BANNER */
        .banner-container { width: 100%; height: 200px; position: relative; overflow: hidden; border-bottom: 2px solid var(--accent); background: #000; }
        .banner-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.65); }
        .banner-overlay { position: absolute; bottom: 15px; left: 20px; z-index: 10; }
        .banner-text { font-size: 18px; font-weight: 900; color: var(--accent); text-transform: uppercase; text-shadow: 2px 2px 8px #000; margin: 0; }

        /* RUN BUTTON */
        #hero { height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-run { 
            width: 130px; height: 130px; border-radius: 50%; border: none; background: var(--accent);
            color: #000; font-size: 20px; font-weight: 900; cursor: pointer; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transition: transform 0.2s;
        }
        .btn-run:active { transform: scale(0.95); }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; display: none; }
        .card { background: var(--card); border-radius: 18px; margin-bottom: 25px; border: 1px solid #30363d; overflow: hidden; }
        .card-header { padding: 12px 20px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .tag { padding: 3px 12px; border-radius: 4px; font-size: 9px; font-weight: 900; color: #000; text-transform: uppercase; }
        
        .headline { font-size: 19px; font-weight: 800; color: #fff; text-decoration: none; display: block; padding: 20px 20px 10px; line-height: 1.3; }
        .summary { font-size: 14px; color: #8b949e; padding: 0 20px 20px; margin: 0; line-height: 1.6; }

        /* GRÁFICO SOCIAL CORRIGIDO */
        .trends-panel { background: #000; border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; margin: 30px 0; }
        .bar-container { margin-bottom: 18px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; font-weight: bold; }
        .bar-bg { background: #161b22; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); transition: width 2s cubic-bezier(0.1, 0, 0, 1); box-shadow: 0 0 10px var(--accent); width: 0; }

        .briefing-box { background: #0d1117; border: 1px solid #333; padding: 25px; border-radius: 20px; }
        .briefing-list { list-style: none; padding: 0; margin: 0; }
        .briefing-list li { margin-bottom: 12px; padding-left: 20px; position: relative; font-size: 14px; color: #eee; line-height: 1.4; }
        .briefing-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

        #loader { display: none; text-align: center; color: var(--accent); padding: 100px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

<div class="banner-container">
    <video id="bannerVid" class="banner-video" autoplay muted loop playsinline>
        <source src="gemini_generated_video_134FB941_1773521655742.mp4" type="video/mp4">
    </video>
    <div class="banner-overlay">
        <p class="banner-text">Eng. LMM recomenda:</p>
    </div>
</div>

<div id="hero">
    <button class="btn-run" onclick="launchRadar()">RUN...</button>
    <p style="color:#444; font-size:10px; margin-top:15px; letter-spacing:2px">SISTEMA_DE_VARREDURA_V10.1</p>
</div>

<div id="loader">_A INTERCETAR DADOS...</div>

<div id="main-content" class="container">
    <div id="news-feed"></div>
    
    <div class="trends-panel">
        <p style="color:var(--accent); font-size:10px; font-weight:900; margin:0 0 20px 0; letter-spacing:1px">VIBE SOCIAL // IA 24H</p>
        <div id="social-list"></div>
    </div>

    <div class="briefing-box">
        <p style="color:var(--accent); font-size:10px; font-weight:900; margin:0 0 15px 0">RESUMIDAMENTE:</p>
        <ul id="briefing-list" class="briefing-list"></ul>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDYeRO1K8cMLzTF33Aee4YmwCf14-RB384";
    const MODEL = "gemini-1.5-flash"; // Modelo estável e rápido

    async function launchRadar() {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const prompt = `Analisa as tendências de IA de hoje. 
            Retorna EXATAMENTE neste formato:
            NEWS: NOTÍCIA | Fonte | Título | Resumo de 2 frases curtas | Link
            (repete 5 vezes)
            ---
            SOCIAL: LinkedIn:85, Facebook:60, Instagram:70
            ---
            SUMMARY: Tópico 1
            Tópico 2
            Tópico 3`;

            const aiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const result = await aiRes.json();
            const text = result.candidates[0].content.parts[0].text;
            renderApp(text);
        } catch (e) { 
            console.error(e);
            alert("Erro na varredura. Verifica a ligação."); 
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }
    }

    function renderApp(text) {
        const sections = text.split('---');
        
        // 1. Notícias
        const newsLines = sections[0].replace('NEWS:', '').trim().split('\n').filter(l => l.includes('|'));
        document.getElementById('news-feed').innerHTML = newsLines.map(l => {
            const [type, src, head, sum, url] = l.split('|').map(s => s.trim());
            return `<div class="card">
                <div class="card-header"><span style="font-size:10px">${src}</span><span class="tag" style="background:var(--blue)">${type}</span></div>
                <a href="${url || '#'}" target="_blank" class="headline">${head}</a>
                <p class="summary">${sum}</p>
            </div>`;
        }).join('');

        // 2. Social (Lógica Reforçada)
        const socialPart = sections[1].replace('SOCIAL:', '').trim();
        const socialItems = socialPart.split(',').map(item => item.trim());
        document.getElementById('social-list').innerHTML = socialItems.map(s => {
            const parts = s.split(':');
            const name = parts[0] || "Rede";
            const val = parts[1] ? parts[1].replace(/\D/g, '') : "50";
            return `<div class="bar-container">
                <div class="bar-label"><span>${name}</span><span>${val}%</span></div>
                <div class="bar-bg"><div class="bar-fill" style="width:${val}%"></div></div>
            </div>`;
        }).join('');

        // 3. Resumo
        const summaryLines = sections[2].replace('SUMMARY:', '').trim().split('\n');
        document.getElementById('briefing-list').innerHTML = summaryLines.map(t => `<li>${t.trim()}</li>`).join('');
        
        // Ativar animação das barras
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                const targetWidth = bar.style.width;
                bar.style.width = '0';
                setTimeout(() => bar.style.width = targetWidth, 100);
            });
        }, 300);
    }
</script>
</body>
</html>
