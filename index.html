<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR INTELLIGENCE</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #030303; --card: #0d1117; --accent: #00ff88; --blue: #00d2ff; --text: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; -webkit-font-smoothing: antialiased; }

        /* BANNER COM VÍDEO */
        .banner { width: 100%; height: 210px; position: relative; overflow: hidden; border-bottom: 2px solid var(--accent); background: #000; }
        .banner video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7) contrast(1.2); }
        .banner-overlay { position: absolute; bottom: 15px; left: 15px; z-index: 10; pointer-events: none; }
        .banner-txt { font-size: 18px; font-weight: 900; color: var(--accent); text-transform: uppercase; text-shadow: 2px 2px 10px #000; letter-spacing: 1px; }

        /* HERO & RUN */
        #hero { height: 45vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-run { 
            width: 130px; height: 130px; border-radius: 50%; border: none; background: var(--accent);
            color: #000; font-size: 22px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3); transition: 0.3s; -webkit-tap-highlight-color: transparent;
        }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; display: none; }

        /* CARDS DE NOTÍCIAS */
        .card { background: var(--card); border-radius: 18px; margin-bottom: 25px; border: 1px solid #30363d; overflow: hidden; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-header { padding: 12px 20px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .card-body { padding: 20px; }
        .headline { font-size: 19px; font-weight: 800; color: #fff; text-decoration: none; display: block; line-height: 1.3; margin-bottom: 10px; }
        .summary { font-size: 14px; color: #8b949e; line-height: 1.6; margin: 0; }

        /* GRÁFICOS SOCIAIS */
        .trends-panel { background: #000; border: 1px dashed var(--accent); border-radius: 20px; padding: 25px; margin: 35px 0; }
        .bar-container { margin-bottom: 20px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; color: #ccc; }
        .bar-bg { background: #161b22; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 2s cubic-bezier(0.1, 0.5, 0.1, 1); box-shadow: 0 0 15px var(--accent); }

        /* RESUMIDAMENTE */
        .briefing-box { background: #0d1117; border: 1px solid #333; padding: 25px; border-radius: 20px; position: relative; }
        .briefing-box::before { content: "RESUMIDAMENTE:"; position: absolute; top: -10px; left: 20px; background: var(--accent); color: #000; font-size: 10px; font-weight: 900; padding: 2px 10px; border-radius: 4px; }
        .briefing-list { list-style: none; padding: 0; margin: 10px 0 0; }
        .briefing-list li { margin-bottom: 12px; padding-left: 25px; position: relative; color: #eee; font-size: 14px; line-height: 1.5; }
        .briefing-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

        #loader { display: none; text-align: center; color: var(--accent); padding: 80px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>

<div class="banner">
    <video autoplay muted loop playsinline webkit-playsinline id="headerVideo">
        <source src="gemini_generated_video_134FB941.mp4" type="video/mp4">
    </video>
    <div class="banner-overlay">
        <p class="banner-txt">Eng. LMM recomenda:</p>
    </div>
</div>

<div id="hero">
    <button class="btn-run" onclick="launchRadar()">RUN</button>
    <p style="color:#333; font-size:9px; letter-spacing:5px; margin-top:25px">ENGENHARIA_DE_DADOS_PRO</p>
</div>

<div id="loader">_A INTERCEPTAR SINAIS...</div>

<div id="main-content" class="container">
    <div id="news-feed"></div>
    <div class="trends-panel">
        <p style="color:var(--accent); font-size:10px; font-weight:900; margin:0 0 20px 0; letter-spacing:2px">VIBE SOCIAL // IA 24H</p>
        <div id="social-list"></div>
    </div>
    <div class="briefing-box">
        <ul id="briefing-list" class="briefing-list"></ul>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDYeRO1K8cMLzTF33Aee4YmwCf14-RB384";
    const MODEL = "gemini-1.5-flash";

    async function launchRadar() {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const prompt = `Analisa as 5 notícias de IA mais impactantes de hoje. 
            Retorna exatamente neste formato:
            NEWS: [FONTE] | [TITULO] | [RESUMO 2 FRASES] | [LINK]
            ---
            SOCIAL: LinkedIn:88 | Facebook:65 | Instagram:75
            ---
            SUMMARY: Tópico 1 | Tópico 2 | Tópico 3 | Tópico 4 | Tópico 5`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            const textResponse = data.candidates[0].content.parts[0].text;
            renderAll(textResponse);
        } catch (e) {
            alert("Erro de Varredura: " + e.message);
            document.getElementById('hero').style.display = 'flex';
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function renderAll(text) {
        const parts = text.split('---');
        
        // Render Notícias
        const newsLines = parts[0].replace('NEWS:', '').trim().split('\n').filter(l => l.includes('|'));
        document.getElementById('news-feed').innerHTML = newsLines.map(line => {
            const [src, title, sum, url] = line.split('|').map(s => s.trim().replace('[','').replace(']',''));
            return `
                <div class="card">
                    <div class="card-header"><span style="font-size:10px; color:var(--accent)">${src}</span></div>
                    <div class="card-body">
                        <a href="${url}" target="_blank" class="headline">${title}</a>
                        <p class="summary">${sum}</p>
                    </div>
                </div>`;
        }).join('');

        // Render Social (Blindado contra undefined)
        const socialItems = parts[1].replace('SOCIAL:', '').trim().split('|');
        document.getElementById('social-list').innerHTML = socialItems.map(item => {
            const [name, rawVal] = item.split(':').map(s => s.trim());
            const val = rawVal ? rawVal.replace(/\D/g, '') : "50";
            return `
                <div class="bar-container">
                    <div class="bar-label"><span>${name}</span><span>${val}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" data-width="${val}%"></div></div>
                </div>`;
        }).join('');

        // Render Briefing
        const briefing = parts[2].replace('SUMMARY:', '').trim().split('|');
        document.getElementById('briefing-list').innerHTML = briefing.map(t => `<li>${t.trim()}</li>`).join('');

        document.getElementById('main-content').style.display = 'block';
        
        // Ativar Animação das Barras
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => {
                bar.style.width = bar.getAttribute('data-width');
            });
        }, 300);

        lucide.createIcons();
    }

    // Tentar forçar o vídeo no iOS
    window.addEventListener('load', () => {
        const v = document.getElementById('headerVideo');
        v.play().catch(() => {
            console.log("iOS requer interação para som, mas muted deve funcionar.");
        });
    });
</script>
</body>
</html>
