<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR PRO</title>
    <style>
        :root { --bg: #030303; --accent: #00ff88; --card: #0d1117; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        .banner { width: 100%; height: 120px; position: relative; overflow: hidden; border-bottom: 2px solid var(--accent); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.65); }
        .banner-txt { position: absolute; bottom: 12px; left: 15px; color: var(--accent); font-weight: 900; font-size: 14px; text-transform: uppercase; text-shadow: 2px 2px 8px #000; }
        #hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-run { width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent); color: #000; font-size: 20px; font-weight: 900; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); cursor: pointer; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; display: none; }
        .card { background: var(--card); border-radius: 15px; margin-bottom: 15px; border: 1px solid #333; padding: 15px; }
        .trends { background: #000; border: 1px dashed var(--accent); border-radius: 15px; padding: 20px; margin: 25px 0; }
        .bar-wrap { margin-bottom: 15px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; font-weight: bold; }
        .bar-bg { background: #161b22; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 2s ease-out; box-shadow: 0 0 10px var(--accent); }
        #loader { display: none; text-align: center; color: var(--accent); padding: 60px; font-family: monospace; }
    </style>
</head>
<body>

<div class="banner">
    <video autoplay muted loop playsinline>
        <source src="gemini_generated_video_134FB941.mp4" type="video/mp4">
    </video>
    <div class="banner-txt">Eng. LMM recomenda:</div>
</div>

<div id="hero">
    <button class="btn-run" onclick="launch()">RUN</button>
</div>

<div id="loader">_A INTERCEPTAR SINAIS...</div>

<div id="main-content" class="container">
    <div id="feed"></div>
    <div class="trends" id="social-panel">
        <p style="color:var(--accent); font-size:10px; font-weight:900; margin:0 0 15px 0">BUZZ SOCIAL 24H</p>
        <div id="social-bars"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBeIJKco3LH9jyrtI8JUJ2H2ZYY4P1bLxI";

    async function launch() {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Dá-me 5 notícias curtas de IA hoje. Formato: Fonte | Título | Resumo. Depois SOCIAL: LinkedIn:90, Facebook:75, Instagram:80" }] }] })
            });

            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            render(text);
        } catch (e) {
            alert("Erro na API. Provavelmente a chave foi desativada por estar num repositório público.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function render(text) {
        const parts = text.split('SOCIAL:');
        
        const news = parts[0].split('\n').filter(l => l.includes('|'));
        document.getElementById('feed').innerHTML = news.map(n => {
            const [s, t, r] = n.split('|');
            return `<div class="card"><div style="color:var(--accent); font-size:10px">${s}</div><div style="font-weight:bold;margin:5px 0">${t}</div><div style="font-size:12px;color:#8b949e">${r}</div></div>`;
        }).join('');

        if (parts[1]) {
            const items = parts[1].split(',');
            document.getElementById('social-bars').innerHTML = items.map(i => {
                const [n, v] = i.split(':');
                const num = v.replace(/\D/g, '');
                return `<div class="bar-wrap">
                    <div class="bar-label"><span>${n.trim()}</span><span>${num}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${num}%"></div></div>
                </div>`;
            }).join('');
        }

        document.getElementById('main-content').style.display = 'block';
    }
</script>
</body>
</html>
