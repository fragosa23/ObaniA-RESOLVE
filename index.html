<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR PRO</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #030303; --card: #0d1117; --accent: #00ff88; --blue: #00d2ff; --text: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; -webkit-font-smoothing: antialiased; }

        /* BANNER CURTO (CROP) */
        .banner-container { 
            width: 100%; 
            height: 120px; /* Altura reduzida conforme pedido */
            position: relative; 
            overflow: hidden; 
            border-bottom: 2px solid var(--accent); 
            background: #000; 
        }
        .banner-video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Faz o crop automático */
            object-position: center; 
            filter: brightness(0.6) contrast(1.1); 
        }
        .banner-txt { 
            position: absolute; bottom: 12px; left: 15px; 
            color: var(--accent); font-weight: 900; font-size: 15px; 
            text-transform: uppercase; text-shadow: 2px 2px 10px #000; 
        }

        /* BOTÃO RUN */
        #hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-run { 
            width: 120px; height: 120px; border-radius: 50%; border: none; background: var(--accent);
            color: #000; font-size: 20px; font-weight: 900; cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); transition: 0.3s;
        }

        .container { padding: 15px; max-width: 600px; margin: 0 auto; display: none; }

        /* NOTÍCIAS */
        .card { background: var(--card); border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .card-header { padding: 10px 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .card-body { padding: 15px; }
        .headline { font-size: 18px; font-weight: 800; color: #fff; text-decoration: none; display: block; line-height: 1.3; margin-bottom: 8px; }
        .summary { font-size: 13px; color: #8b949e; line-height: 1.5; margin: 0; }

        /* GRÁFICOS SOCIAIS */
        .trends-panel { background: #000; border: 1px dashed var(--accent); border-radius: 15px; padding: 20px; margin: 30px 0; }
        .bar-container { margin-bottom: 15px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; font-weight: bold; color: #aaa; }
        .bar-bg { background: #161b22; height: 8px; border-radius: 4px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0; transition: width 2s cubic-bezier(0.1, 0.5, 0.1, 1); box-shadow: 0 0 10px var(--accent); }

        /* BRIEFING */
        .briefing-box { background: #0d1117; border: 1px solid #333; padding: 20px; border-radius: 15px; position: relative; }
        .briefing-box::before { content: "RESUMIDAMENTE:"; position: absolute; top: -10px; left: 15px; background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 2px 8px; border-radius: 3px; }
        .briefing-list { list-style: none; padding: 0; margin: 5px 0 0; font-size: 13px; color: #eee; line-height: 1.4; }
        .briefing-list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .briefing-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

        #loader { display: none; text-align: center; color: var(--accent); padding: 60px; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>

<div class="banner-container">
    <video class="banner-video" autoplay muted loop playsinline id="v">
        <source src="gemini_generated_video_134FB941.mp4" type="video/mp4">
    </video>
    <div class="banner-txt">Eng. LMM recomenda:</div>
</div>

<div id="hero">
    <button class="btn-run" onclick="launchRadar()">RUN</button>
</div>

<div id="loader">_A INTERCEPTAR SINAIS...</div>

<div id="main-content" class="container">
    <div id="news-feed"></div>
    <div class="trends-panel">
        <p style="color:var(--accent); font-size:9px; font-weight:900; margin:0 0 15px 0; letter-spacing:1px">BUZZ SOCIAL 24H</p>
        <div id="social-list"></div>
    </div>
    <div class="briefing-box">
        <ul id="briefing-list" class="briefing-list"></ul>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyDYeRO1K8cMLzTF33Aee4YmwCf14-RB384";
    const MODEL = "gemini-1.5-flash";

    async function launchRadar() {
        document.getElementById('hero').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const prompt = `Analisa 5 notícias de IA de hoje. Retorna exatamente neste formato:
            NEWS: Fonte | Título | Resumo de 2 frases | Link
            ---
            SOCIAL: LinkedIn:90 | Facebook:70 | Instagram:80
            ---
            SUMMARY: Tópico 1 | Tópico 2 | Tópico 3`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await res.json();
            
            // PROTEÇÃO CONTRA RESPOSTA VAZIA
            if (!data.candidates || !data.candidates[0]) {
                throw new Error("A Google não enviou dados. Tenta novamente.");
            }

            render(data.candidates[0].content.parts[0].text);
        } catch (e) {
            alert("Erro: " + e.message);
            document.getElementById('hero').style.display = 'flex';
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function render(text) {
        const parts = text.split('---');
        
        // 1. Notícias
        const news = parts[0].replace('NEWS:', '').trim().split('\n').filter(l => l.includes('|'));
        document.getElementById('news-feed').innerHTML = news.map(l => {
            const [src, tit, sum, url] = l.split('|').map(s => s.trim());
            return `<div class="card">
                <div class="card-header"><span style="font-size:9px; color:var(--accent)">${src}</span></div>
                <div class="card-body">
                    <a href="${url}" target="_blank" class="headline">${tit}</a>
                    <p class="summary">${sum}</p>
                </div>
            </div>`;
        }).join('');

        // 2. Social
        const social = parts[1].replace('SOCIAL:', '').trim().split('|');
        document.getElementById('social-list').innerHTML = social.map(s => {
            const [name, valRaw] = s.split(':').map(x => x.trim());
            const val = valRaw ? valRaw.replace(/\D/g, '') : "50";
            return `<div class="bar-container">
                <div class="bar-label"><span>${name}</span><span>${val}%</span></div>
                <div class="bar-bg"><div class="bar-fill" data-width="${val}%"></div></div>
            </div>`;
        }).join('');

        // 3. Briefing
        const briefing = parts[2].replace('SUMMARY:', '').trim().split('|');
        document.getElementById('briefing-list').innerHTML = briefing.map(t => `<li>${t.trim()}</li>`).join('');

        document.getElementById('main-content').style.display = 'block';

        // Ativar Animação
        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.getAttribute('data-width'));
        }, 200);
        lucide.createIcons();
    }
</script>
</body>
</html>
