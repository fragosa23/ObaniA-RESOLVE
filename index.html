<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LMM RADAR V30.0</title>
    <style>
        :root { --bg: #030303; --accent: #00ff88; --card: #0d1117; --text: #ffffff; --nav-bg: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .banner { width: 100%; height: 120px; border-bottom: 2px solid var(--accent); position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--nav-bg); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { color: #666; font-size: 10px; text-align: center; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--accent); }
        .page-section { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-bottom: 15px; }
        .btn-run { background: var(--accent); color: #000; }
        .btn-test { background: #1a1a1a; color: #fff; border: 1px solid #444; }
        .key-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        #debug-log { background: #000; color: #ffbc00; padding: 10px; font-family: monospace; font-size: 10px; border-radius: 5px; margin-top: 10px; border: 1px solid #333; white-space: pre-wrap; }
        .card { background: var(--card); border-radius: 12px; margin-bottom: 12px; border: 1px solid #222; padding: 15px; }
        .card-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--accent); font-weight: 900; margin-bottom: 8px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="banner">
    <video autoplay muted loop playsinline><source src="gemini_generated_video_134FB941.mp4" type="video/mp4"></video>
</div>

<div id="section-news" class="page-section active">
    <button class="btn btn-run" onclick="startRadar()">EXECUTAR RADAR</button>
    <div id="feed"></div>
</div>

<div id="section-settings" class="page-section">
    <h3 style="color:var(--accent)">SETUP DE ENGENHARIA</h3>
    <input type="password" id="api-key-input" class="key-input" placeholder="Insere a tua API Key...">
    <button class="btn btn-run" onclick="saveKey()">1. GUARDAR CHAVE</button>
    <button class="btn btn-test" onclick="testKey()">2. TESTAR CONEXÃO</button>
    <div id="debug-log">Pronto para diagnóstico...</div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('news', this)">📰<br>RADAR</div>
    <div class="nav-item" onclick="switchPage('settings', this)">⚙️<br>SETUP</div>
</div>

<script>
    function log(msg) { document.getElementById('debug-log').innerText = `LOG: ${msg}`; }

    function saveKey() {
        const key = document.getElementById('api-key-input').value.trim();
        if(key.startsWith('AIza')) {
            localStorage.setItem('lmm_key', key);
            log("Chave guardada no Safari!");
        } else { log("Erro: Chave deve começar por AIza."); }
    }

    // AJUSTE DE ROTA: Mudamos para v1 e gemini-1.5-flash-latest
    async function testKey() {
        const key = localStorage.getItem('lmm_key');
        if(!key) { log("Nenhuma chave guardada!"); return; }
        log("A contactar servidores Google (v1)...");
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Dá-me 3 notícias curtas de tecnologia de hoje com o formato: TITULO | RESUMO" }] }] })
            });
            const data = await res.json();
            if(res.ok) { 
                log("✅ SUCESSO! A IA respondeu.");
                parseResponse(data.candidates[0].content.parts[0].text);
            }
            else { log(`❌ ERRO ${res.status}: ${data.error.message}`); }
        } catch (e) { log("❌ Erro de Rede."); }
    }

    function parseResponse(text) {
        const feed = document.getElementById('feed');
        const lines = text.split('\n').filter(l => l.includes('|'));
        feed.innerHTML = lines.map(line => {
            const [tit, res] = line.split('|');
            return `<div class="card"><div class="card-header">NEWS</div><div style="font-weight:bold; margin-bottom:5px;">${tit}</div><div style="font-size:12px; color:#aaa;">${res}</div></div>`;
        }).join('');
    }

    async function startRadar() {
        testKey(); 
    }

    function switchPage(pageId, el) {
        document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('section-' + pageId).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
